# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  sqlite:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        redis-version: ['3', 'latest']

    services:
      redis:
        image: redis:${{ matrix.redis-version }}
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Install imagemagick and HEIF support
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libheif-examples
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: npm ci
      - run: npm run test:sqlite
        env:
          CI: true

  postgres:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        redis-version: ['3', 'latest']
        postgresql-version: ['17.3-alpine', 'latest']

    services:
      postgres:
        image: postgres:${{ matrix.postgresql-version }}
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:${{ matrix.redis-version }}
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Install HEIF support
        run: |
          sudo apt-get update
          sudo apt-get install -y libheif-examples

      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: npm ci
      - run: npm run test:pg
        env:
          CI: true
          TEST_DATABASE_URL: 'postgres://testuser:testpass@localhost/testdb'

  dbschema:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        redis-version: ['3']
        postgresql-version: ['17.3-alpine']

    services:
      postgres:
        image: postgres:${{ matrix.postgresql-version }}
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:${{ matrix.redis-version }}
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      # Step to install PostgreSQL 17 client tools and HEIF support
      - name: Add PostgreSQL 17 repository
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 libheif-examples

      # Ensure PostgreSQL 17 binaries are used by exporting the correct PATH
      - name: Check version of pg_dump
        run: |
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          pg_dump -V

      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: npm ci
      - run: npm run test:dbschema
        env:
          CI: true
          TEST_DATABASE_URL: 'postgres://testuser:testpass@localhost/testdb'
